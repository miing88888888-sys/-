<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>旅伴記帳</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #101828;
      --muted: #667085;
      --line: #e4e7ec;
      --primary: #2563eb;
      --teal: #14b8a6;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --soft: #eff6ff;
      --shadow: 0 14px 32px rgba(16, 24, 40, 0.1);
      --radius: 22px;
      --nav-height: 78px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(20,184,166,.22), transparent 30%),
        radial-gradient(circle at top right, rgba(37,99,235,.24), transparent 35%),
        linear-gradient(180deg, #eef6ff 0%, var(--bg) 340px);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 16px calc(var(--nav-height) + 28px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 44px; height: 44px; border-radius: 16px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      color: white; font-size: 22px;
      box-shadow: 0 12px 24px rgba(37,99,235,.22);
    }
    .brand-title { font-size: 20px; font-weight: 950; letter-spacing: -0.4px; }
    .brand-subtitle { color: var(--muted); font-size: 12px; font-weight: 700; margin-top: 2px; }
    .pill {
      max-width: 170px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.76);
      color: #344054;
      font-size: 12px;
      font-weight: 850;
      box-shadow: 0 8px 20px rgba(16,24,40,.08);
    }

    .page { display: none; animation: fadeUp .22s ease both; }
    .page.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

      overflow: hidden;
      border-radius: 28px;
      color: white;
